workflows:
  build-release:
    name: Build release APK
    environment:
      flutter: stable
    scripts:
      - flutter pub get
      - flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
    publishing:
      email:
        recipients:
          - seuemail@exemplo.com
        on_build_success: true
        on_build_failure: false
